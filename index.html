<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTA VI Vehicle Database</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    <script defer
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        ink: {
                            900: '#07090d',
                            800: '#0c1118',
                            700: '#121826',
                            600: '#1a2233',
                            500: '#232c40',
                        },
                        neon: {
                            pink: '#ff2d87',
                            cyan: '#00e5ff',
                            lime: '#c6ff3d',
                        },
                    },
                    boxShadow: {
                        'glow-pink': '0 0 24px -4px rgba(255, 45, 135, 0.55)',
                        'glow-cyan': '0 0 24px -4px rgba(0, 229, 255, 0.45)',
                    },
                },
            },
        };
    </script>

    <style>
        html, body { height: 100%; }
        body {
            background:
                radial-gradient(1200px 600px at 85% -10%, rgba(255, 45, 135, 0.12), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(0, 229, 255, 0.10), transparent 60%),
                #07090d;
        }

        /* Custom scrollbar */
        .scroll-thin::-webkit-scrollbar { width: 8px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }
        .scroll-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 45, 135, 0.45);
        }

        /* Card hover */
        .vehicle-card {
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }
        .vehicle-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 45, 135, 0.5);
            box-shadow: 0 0 0 1px rgba(255, 45, 135, 0.25), 0 10px 30px -10px rgba(255, 45, 135, 0.35);
        }
        .vehicle-card.active {
            border-color: rgba(0, 229, 255, 0.7);
            background: linear-gradient(180deg, rgba(0,229,255,0.07), rgba(0,229,255,0.02));
            box-shadow: 0 0 0 1px rgba(0, 229, 255, 0.45), 0 10px 30px -10px rgba(0, 229, 255, 0.45);
        }

        /* ---------------- Leaflet overrides ---------------- */
        #map { background: #07090d; }
        .leaflet-container {
            background: #07090d;
            font-family: 'Inter', system-ui, sans-serif;
            outline: none;
        }
        /* Subtle scanlines over the map image for that arcade-CRT feel */
        .leaflet-image-layer {
            image-rendering: -webkit-optimize-contrast;
            filter: saturate(1.05) contrast(1.05);
        }
        /* Leaflet zoom control restyle */
        .leaflet-bar {
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            background: rgba(12, 17, 24, 0.85) !important;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6) !important;
        }
        .leaflet-bar a,
        .leaflet-bar a:hover {
            background: transparent !important;
            color: #cbd5e1 !important;
            border-bottom-color: rgba(255, 255, 255, 0.08) !important;
            transition: background 150ms ease, color 150ms ease;
        }
        .leaflet-bar a:hover {
            background: rgba(255, 45, 135, 0.15) !important;
            color: #fff !important;
        }
        .leaflet-control-attribution {
            background: rgba(12, 17, 24, 0.75) !important;
            color: #64748b !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            border-bottom: 0 !important;
            border-right: 0 !important;
            font-size: 10px !important;
            padding: 2px 6px !important;
        }
        .leaflet-control-attribution a { color: #94a3b8 !important; }

        /* ---------------- Custom GTA marker (divIcon) ---------------- */
        .gta-marker-wrap { background: transparent !important; border: 0 !important; }
        .gta-marker {
            width: 14px;
            height: 14px;
            border-radius: 9999px;
            background: #ff2d87;
            box-shadow:
                0 0 0 2px rgba(255, 255, 255, 0.75),
                0 0 18px rgba(255, 45, 135, 0.7);
            position: relative;
            transition: transform 200ms ease, background 200ms ease, box-shadow 200ms ease;
            cursor: pointer;
        }
        .gta-marker::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 9999px;
            background: rgba(255, 45, 135, 0.35);
            animation: pulse 1.6s ease-out infinite;
        }
        .gta-marker:hover { transform: scale(1.15); }
        .gta-marker.is-active {
            background: #00e5ff;
            box-shadow:
                0 0 0 2px rgba(255, 255, 255, 0.95),
                0 0 22px rgba(0, 229, 255, 0.85);
            transform: scale(1.2);
        }
        .gta-marker.is-active::before { background: rgba(0, 229, 255, 0.4); }
        @keyframes pulse {
            0%   { transform: scale(0.8); opacity: 0.9; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* ---------------- Leaflet popup restyle ---------------- */
        .leaflet-popup-content-wrapper {
            background: rgba(12, 17, 24, 0.92) !important;
            color: #e2e8f0 !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-popup-content {
            margin: 10px 12px !important;
            font-size: 12px !important;
            line-height: 1.4 !important;
        }
        .leaflet-popup-tip {
            background: rgba(12, 17, 24, 0.92) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }
        .leaflet-popup-close-button { color: #94a3b8 !important; }

        /* Class chip color variants */
        .chip-suvs { color: #c6ff3d; background: rgba(198, 255, 61, 0.10); border-color: rgba(198, 255, 61, 0.25); }
        .chip-sports { color: #ff2d87; background: rgba(255, 45, 135, 0.10); border-color: rgba(255, 45, 135, 0.25); }
        .chip-emergency { color: #00e5ff; background: rgba(0, 229, 255, 0.10); border-color: rgba(0, 229, 255, 0.25); }
        .chip-default { color: #cbd5e1; background: rgba(148, 163, 184, 0.10); border-color: rgba(148, 163, 184, 0.20); }
    </style>
</head>

<body class="text-slate-200 font-sans antialiased overflow-hidden">

    <div class="flex h-screen w-screen flex-col md:flex-row">

        <!-- ============================== SIDEBAR ============================== -->
        <aside class="flex h-1/2 w-full flex-col border-b border-white/5 bg-ink-800/60 backdrop-blur-md md:h-full md:w-[380px] md:border-b-0 md:border-r lg:w-[420px]">

            <!-- Header -->
            <header class="flex items-center gap-3 border-b border-white/5 px-5 py-4">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-neon-pink to-neon-cyan shadow-glow-pink">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                        <path d="M14 16H9m10 0h1.5a1.5 1.5 0 0 0 1.5-1.5v-3.4a2 2 0 0 0-.586-1.414l-1.914-1.914A2 2 0 0 0 18.086 7H5.5a1.5 1.5 0 0 0-1.342.83L2.5 11.5V14.5A1.5 1.5 0 0 0 4 16h1"></path>
                        <circle cx="7" cy="16" r="2"></circle>
                        <circle cx="17" cy="16" r="2"></circle>
                    </svg>
                </div>
                <div class="leading-tight">
                    <h1 class="text-base font-bold tracking-wide text-white">GTA VI <span class="text-neon-pink">VEHICLE DB</span></h1>
                    <p class="text-[11px] font-mono uppercase tracking-[0.18em] text-slate-400">Vice City Field Manual</p>
                </div>
            </header>

            <!-- Search -->
            <div class="px-5 pt-4">
                <label class="relative block">
                    <span class="sr-only">Search vehicles</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input
                        id="search"
                        type="search"
                        autocomplete="off"
                        placeholder="Search by name or class..."
                        class="w-full rounded-lg border border-white/10 bg-ink-700/70 py-2.5 pl-9 pr-3 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-neon-pink/60 focus:ring-2 focus:ring-neon-pink/20"
                    />
                </label>

                <div class="mt-3 flex items-center justify-between text-[11px] font-mono uppercase tracking-[0.18em] text-slate-500">
                    <span><span id="result-count" class="text-slate-300">0</span> results</span>
                    <button id="clear-search" class="hidden text-neon-cyan hover:text-white">Clear</button>
                </div>
            </div>

            <!-- Vehicle list -->
            <div id="vehicle-list" class="scroll-thin mt-3 flex-1 space-y-2 overflow-y-auto px-5 pb-5">
                <!-- Vehicle cards injected here -->
            </div>

            <!-- Footer -->
            <footer class="border-t border-white/5 px-5 py-3 text-[10px] font-mono uppercase tracking-[0.2em] text-slate-500">
                <span class="text-neon-pink">●</span> Live database · v0.1.0
            </footer>
        </aside>

        <!-- ============================== MAP AREA ============================== -->
        <main class="relative flex-1 overflow-hidden">

            <!-- Leaflet renders into this container -->
            <div id="map" class="h-full w-full"></div>

            <!-- Top HUD bar (overlay above Leaflet panes) -->
            <div class="pointer-events-none absolute left-0 right-0 top-0 z-[1000] flex items-center justify-between px-6 py-4">
                <div class="pointer-events-auto flex items-center gap-2 rounded-full border border-white/10 bg-ink-800/70 px-3 py-1.5 backdrop-blur-md">
                    <span class="h-2 w-2 rounded-full bg-neon-lime shadow-[0_0_8px_rgba(198,255,61,0.8)]"></span>
                    <span class="text-[11px] font-mono uppercase tracking-[0.18em] text-slate-300">Map online</span>
                </div>
                <div class="pointer-events-auto hidden items-center gap-2 rounded-full border border-white/10 bg-ink-800/70 px-3 py-1.5 backdrop-blur-md md:flex">
                    <span class="text-[11px] font-mono uppercase tracking-[0.18em] text-slate-400">Coords</span>
                    <span id="hud-coords" class="text-[11px] font-mono text-slate-200">—</span>
                </div>
            </div>

            <!-- Selected vehicle info panel -->
            <div id="map-info" class="pointer-events-none absolute bottom-6 left-1/2 z-[1000] hidden -translate-x-1/2 md:left-6 md:translate-x-0">
                <div class="pointer-events-auto w-[min(92vw,420px)] overflow-hidden rounded-xl border border-white/10 bg-ink-800/85 backdrop-blur-xl shadow-2xl">
                    <div class="flex items-center justify-between border-b border-white/5 px-4 py-2">
                        <span class="text-[10px] font-mono uppercase tracking-[0.22em] text-slate-400">Selected vehicle</span>
                        <button id="info-close" class="text-slate-400 transition hover:text-white" aria-label="Close">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="p-4">
                        <div class="flex items-start justify-between gap-3">
                            <div>
                                <h3 id="info-name" class="text-lg font-bold text-white">—</h3>
                                <p class="mt-0.5 text-xs text-slate-400">Class · <span id="info-class">—</span></p>
                            </div>
                            <div class="text-right">
                                <div class="text-[10px] font-mono uppercase tracking-[0.18em] text-slate-500">Top Speed</div>
                                <div class="text-base font-semibold text-neon-lime"><span id="info-speed">—</span> <span class="text-xs text-slate-400">mph</span></div>
                            </div>
                        </div>
                        <div class="mt-3 grid grid-cols-2 gap-2 text-[11px] font-mono">
                            <div class="rounded-md border border-white/5 bg-ink-700/60 px-2.5 py-1.5">
                                <div class="text-slate-500">SPAWN X</div>
                                <div id="info-x" class="text-slate-100">—</div>
                            </div>
                            <div class="rounded-md border border-white/5 bg-ink-700/60 px-2.5 py-1.5">
                                <div class="text-slate-500">SPAWN Y</div>
                                <div id="info-y" class="text-slate-100">—</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // GTA VI Vehicle Database — placeholder data
        // Replace with real data / API integration as it becomes available.
        // ============================================================
        const VEHICLES = [
            {
                id: 'vapid-suv',
                name: 'Vapid SUV',
                class: 'SUVs',
                top_speed: 112,
                spawn_x: 1284,
                spawn_y: 642,
            },
            {
                id: 'pegassi-sports',
                name: 'Pegassi Sports Car',
                class: 'Sports',
                top_speed: 198,
                spawn_x: 845,
                spawn_y: 1320,
            },
            {
                id: 'bison-police',
                name: 'Bison Police Truck',
                class: 'Emergency',
                top_speed: 134,
                spawn_x: 2105,
                spawn_y: 980,
            },
        ];

        // ============================================================
        // Map config
        // ------------------------------------------------------------
        // The game world is a flat 2D plane; we use Leaflet's
        // L.CRS.Simple so coordinates are interpreted as plain pixels
        // rather than lat/lng. Drop a real map.jpg in this folder to
        // replace the placeholder background.
        // ============================================================
        const MAP_IMAGE_URL =
            'https://placehold.co/3000x2000/0c1118/ff2d87/jpeg?text=VICE+CITY+MAP';
        const WORLD_W = 3000;  // pixels (x)
        const WORLD_H = 2000;  // pixels (y, top-left origin)

        // ============================================================
        // DOM references
        // ============================================================
        const listEl = document.getElementById('vehicle-list');
        const searchEl = document.getElementById('search');
        const clearBtn = document.getElementById('clear-search');
        const resultCountEl = document.getElementById('result-count');
        const infoEl = document.getElementById('map-info');
        const infoClose = document.getElementById('info-close');
        const hudCoords = document.getElementById('hud-coords');

        let activeId = null;
        let map = null;
        const markersById = new Map();

        // ============================================================
        // Helpers
        // ============================================================
        const classChip = (cls) => {
            const key = (cls || '').toLowerCase();
            if (key.includes('suv')) return 'chip-suvs';
            if (key.includes('sport')) return 'chip-sports';
            if (key.includes('emergency') || key.includes('police')) return 'chip-emergency';
            return 'chip-default';
        };

        const escapeHTML = (str) => String(str).replace(/[&<>"']/g, (c) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));

        // ============================================================
        // Render: turns the vehicle JSON into clickable cards
        // ============================================================
        function renderVehicles(vehicles) {
            listEl.innerHTML = '';
            resultCountEl.textContent = vehicles.length;

            if (vehicles.length === 0) {
                listEl.innerHTML = `
                    <div class="rounded-lg border border-dashed border-white/10 bg-ink-700/30 px-4 py-8 text-center">
                        <p class="text-sm text-slate-400">No vehicles match your search.</p>
                        <p class="mt-1 text-xs text-slate-500">Try a different keyword.</p>
                    </div>
                `;
                return;
            }

            const frag = document.createDocumentFragment();
            vehicles.forEach((v) => {
                const card = document.createElement('button');
                card.type = 'button';
                card.dataset.id = v.id;
                card.className = [
                    'vehicle-card group block w-full rounded-xl border border-white/10 bg-ink-700/50 p-4 text-left',
                    'focus:outline-none focus-visible:ring-2 focus-visible:ring-neon-pink/60',
                    v.id === activeId ? 'active' : '',
                ].join(' ');

                card.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <h3 class="truncate text-sm font-semibold text-white">${escapeHTML(v.name)}</h3>
                            <span class="mt-1.5 inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-[10px] font-mono uppercase tracking-[0.16em] ${classChip(v.class)}">
                                ${escapeHTML(v.class)}
                            </span>
                        </div>
                        <div class="shrink-0 text-right">
                            <div class="text-[10px] font-mono uppercase tracking-[0.18em] text-slate-500">Top</div>
                            <div class="text-sm font-semibold text-neon-lime">${v.top_speed}<span class="ml-0.5 text-[10px] text-slate-400">mph</span></div>
                        </div>
                    </div>
                    <div class="mt-3 flex items-center justify-between text-[11px] font-mono text-slate-400">
                        <span class="inline-flex items-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 text-neon-cyan"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            X ${v.spawn_x} · Y ${v.spawn_y}
                        </span>
                        <span class="text-slate-500 transition group-hover:text-neon-pink">View →</span>
                    </div>
                `;

                card.addEventListener('click', () => selectVehicle(v));
                frag.appendChild(card);
            });
            listEl.appendChild(frag);
        }

        // ============================================================
        // Search / filter
        // ============================================================
        function applyFilter(query) {
            const q = query.trim().toLowerCase();
            clearBtn.classList.toggle('hidden', q.length === 0);

            if (!q) {
                renderVehicles(VEHICLES);
                return;
            }
            const filtered = VEHICLES.filter((v) =>
                v.name.toLowerCase().includes(q) ||
                v.class.toLowerCase().includes(q)
            );
            renderVehicles(filtered);
        }

        // ============================================================
        // Leaflet map setup
        // ------------------------------------------------------------
        // CRS.Simple maps pixel coordinates directly. We define bounds
        // matching the image's natural pixel size and let Leaflet
        // handle pan/zoom inside that flat space.
        //
        // Game spawn coordinates use a top-left origin (Y grows down),
        // so we flip Y when converting to Leaflet's LatLng — in
        // CRS.Simple, LatLng = [y, x] with Y growing UP from the
        // bottom-left of the bounds.
        // ============================================================
        function gameToLatLng(spawnX, spawnY) {
            return [WORLD_H - spawnY, spawnX];
        }

        function initMap() {
            map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: -2,
                maxZoom: 2,
                zoomSnap: 0.25,
                zoomDelta: 0.5,
                wheelPxPerZoomLevel: 120,
                zoomControl: false,
                attributionControl: true,
            });

            const bounds = [[0, 0], [WORLD_H, WORLD_W]];
            L.imageOverlay(MAP_IMAGE_URL, bounds, {
                alt: 'Vice City placeholder map',
                interactive: false,
            }).addTo(map);

            map.setMaxBounds([
                [-WORLD_H * 0.25, -WORLD_W * 0.25],
                [WORLD_H * 1.25,  WORLD_W * 1.25],
            ]);
            map.fitBounds(bounds);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            map.attributionControl.setPrefix(
                '<span style="color:#94a3b8">Leaflet</span>'
            );

            map.on('mousemove', (e) => {
                const x = Math.round(e.latlng.lng);
                const y = Math.round(WORLD_H - e.latlng.lat);
                if (x < 0 || x > WORLD_W || y < 0 || y > WORLD_H) return;
                if (!activeId) hudCoords.textContent = `${x}, ${y}`;
            });
        }

        // ============================================================
        // Markers: one per vehicle, driven entirely by the JSON
        // ============================================================
        function buildMarkerIcon() {
            return L.divIcon({
                className: 'gta-marker-wrap',
                html: '<div class="gta-marker"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7],
                popupAnchor: [0, -10],
            });
        }

        function renderMarkers(vehicles) {
            markersById.forEach((m) => map.removeLayer(m));
            markersById.clear();

            vehicles.forEach((v) => {
                const marker = L.marker(gameToLatLng(v.spawn_x, v.spawn_y), {
                    icon: buildMarkerIcon(),
                    title: v.name,
                    riseOnHover: true,
                    keyboard: true,
                    alt: v.name,
                }).addTo(map);

                marker.bindPopup(`
                    <div style="min-width:180px">
                        <div style="font-weight:700;color:#fff;font-size:13px">${escapeHTML(v.name)}</div>
                        <div style="color:#94a3b8;font-size:11px;margin-top:2px;text-transform:uppercase;letter-spacing:0.12em;font-family:'JetBrains Mono',monospace">${escapeHTML(v.class)}</div>
                        <div style="margin-top:6px;color:#c6ff3d;font-family:'JetBrains Mono',monospace;font-size:11px">
                            ${v.top_speed} mph · X ${v.spawn_x} · Y ${v.spawn_y}
                        </div>
                    </div>
                `);

                marker.on('click', () => selectVehicle(v, { fromMarker: true }));
                markersById.set(v.id, marker);
            });
        }

        function setActiveMarker(id) {
            markersById.forEach((marker, mid) => {
                const el = marker.getElement();
                if (!el) return;
                const dot = el.querySelector('.gta-marker');
                if (dot) dot.classList.toggle('is-active', mid === id);
            });
        }

        // ============================================================
        // Selection: smoothly pan + zoom to the chosen vehicle
        // ============================================================
        function selectVehicle(v, opts = {}) {
            activeId = v.id;

            listEl.querySelectorAll('.vehicle-card').forEach((c) => {
                c.classList.toggle('active', c.dataset.id === v.id);
            });

            setActiveMarker(v.id);

            const target = gameToLatLng(v.spawn_x, v.spawn_y);
            map.flyTo(target, 1, { duration: 0.9, easeLinearity: 0.25 });

            const marker = markersById.get(v.id);
            if (marker && !opts.fromMarker) {
                map.once('moveend', () => marker.openPopup());
            } else if (marker && opts.fromMarker) {
                marker.openPopup();
            }

            infoEl.classList.remove('hidden');
            document.getElementById('info-name').textContent = v.name;
            document.getElementById('info-class').textContent = v.class;
            document.getElementById('info-speed').textContent = v.top_speed;
            document.getElementById('info-x').textContent = v.spawn_x;
            document.getElementById('info-y').textContent = v.spawn_y;
            hudCoords.textContent = `${v.spawn_x}, ${v.spawn_y}`;
        }

        function clearSelection() {
            activeId = null;
            infoEl.classList.add('hidden');
            hudCoords.textContent = '—';
            setActiveMarker(null);
            listEl.querySelectorAll('.vehicle-card.active').forEach((c) => c.classList.remove('active'));
            if (map) map.flyToBounds([[0, 0], [WORLD_H, WORLD_W]], { duration: 0.8 });
        }

        // ============================================================
        // Event wiring
        // ============================================================
        searchEl.addEventListener('input', (e) => applyFilter(e.target.value));
        clearBtn.addEventListener('click', () => {
            searchEl.value = '';
            applyFilter('');
            searchEl.focus();
        });
        infoClose.addEventListener('click', clearSelection);

        // ============================================================
        // Bootstrap
        // ------------------------------------------------------------
        // Leaflet is loaded with `defer`, so wait for DOM ready before
        // initializing the map and markers.
        // ============================================================
        function bootstrap() {
            renderVehicles(VEHICLES);
            initMap();
            renderMarkers(VEHICLES);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootstrap);
        } else {
            bootstrap();
        }
    </script>
</body>
</html>
